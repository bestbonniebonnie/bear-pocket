<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#24140e" />
  <title>Bear 留住每一次怦然心動。</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Noto+Serif+TC:wght@500;600;700&family=Nunito:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="mast">
      <div class="brandSeal" aria-hidden="true"><span></span></div>
      <div class="brandText">
        <div class="script">Bear</div>
        <div class="name">留住每一次怦然心動。</div>
      </div>
      <button id="openAdd" class="addOrb" aria-label="新增收藏">＋</button>
    </header>

    <section id="homeView" class="view active">
      <div class="toolPanel">
        <label class="search"><span>⌕</span><input id="searchInput" placeholder="搜尋店名、備註、分類、地點…"></label>
        <div id="moodFilters" class="filters"></div>
      </div>
      <div class="listTitle"><span id="countText">0 筆收藏</span><button id="clearFilters">清除</button></div>
      <div id="cardList" class="cardList"></div>
      <div id="emptyState" class="emptyState hidden">
        <div class="emptyBear"><i></i></div>
        <h3>口袋還空空的</h3>
        <p>貼上網址、上傳圖片，慢慢收好每一個想記住的地方。</p>
        <button id="emptyAdd" class="primary">新增第一筆</button>
      </div>
    </section>

    <section id="categoryView" class="view">
      <div class="pageIntro"><h1>分類管理</h1><p>分類與地方都可以自己新增、編輯、刪除。</p></div>
      <div id="categoryList" class="categoryList"></div>
      <button id="addCategory" class="primary full">＋ 新增分類</button>
    </section>

    <section id="backupView" class="view">
      <div class="pageIntro"><h1>備份</h1><p>收藏存在瀏覽器裡；更新 GitHub 程式碼不會消失，但換手機前請先匯出。</p></div>
      <div class="noteCard"><h3>匯出資料</h3><p>下載 JSON 備份檔。</p><button id="exportBtn" class="primary">匯出 JSON</button></div>
      <div class="noteCard"><h3>匯入資料</h3><p>選擇之前匯出的 JSON 檔，會覆蓋目前資料。</p><input id="importInput" type="file" accept="application/json" hidden><button id="importBtn" class="secondary">選擇檔案匯入</button></div>
      <div class="noteCard quiet"><h3>小提醒</h3><p>圖片會壓縮後存在此裝置瀏覽器。若清除網站資料，收藏可能被清掉。</p></div>
    </section>
  </div>

  <nav class="tabbar">
    <button class="tab active" data-view="homeView"><span>⌂</span>收藏</button>
    <button class="tab" data-view="categoryView"><span>◌</span>分類</button>
    <button id="navAdd" class="centerAdd">＋</button>
    <button class="tab" data-view="backupView"><span>♡</span>備份</button>
    <button id="installHint" class="tab"><span>☾</span>設定</button>
  </nav>

  <dialog id="itemDialog">
    <form id="itemForm" method="dialog" class="sheet">
      <div class="sheetHead"><button type="button" class="x closeDialog">×</button><h2 id="modalTitle">新增收藏</h2><button id="saveItem" type="submit" class="save">儲存</button></div>
      <label class="field"><span>網址</span><div class="urlRow"><input id="urlInput" type="url" placeholder="https://…"><button id="fetchTitle" type="button">帶入</button></div></label>
      <label class="field"><span>店名 / 標題 *</span><input id="titleInput" required placeholder="例如：Little Cloud 小雲咖啡"></label>
      <label class="favLine"><input id="favoriteInput" type="checkbox"> <span>加入最愛 🤎</span></label>
      <div class="cols"><label class="field"><span>分類 *</span><select id="categorySelect" required></select></label><label class="field"><span>地方 / 子分類</span><select id="placeSelect"></select></label></div>
      <div class="field plainMood"><span>心情分類</span><div id="moodChecks" class="moodChecks"></div></div>
      <label class="field"><span>備註</span><textarea id="noteInput" rows="5" placeholder="例如：\n✓ 需要預約\n✓ 適合下午茶\n✓ 下次帶家人來"></textarea></label>
      <div class="field"><span>圖片</span><div class="imagePick"><img id="previewImg" class="hidden" alt="圖片預覽"><label><input id="imageInput" type="file" accept="image/*" hidden><b>＋</b><em>上傳圖片</em></label><button id="removeImage" type="button" class="removeImage hidden">移除照片</button></div><small class="helpText">點照片可以放大查看</small></div>
      <button id="deleteItem" type="button" class="delete hidden">刪除這筆收藏</button>
    </form>
  </dialog>

  <dialog id="categoryDialog">
    <form id="categoryForm" method="dialog" class="sheet small">
      <div class="sheetHead"><button type="button" class="x closeDialog">×</button><h2 id="categoryModalTitle">新增分類</h2><button class="save">儲存</button></div>
      <label class="field"><span>名稱</span><input id="categoryName" required placeholder="例如：旅遊"></label>
    </form>
  </dialog>

  <dialog id="imageDialog" class="imageDialog">
    <button type="button" class="lightClose" onclick="document.getElementById('imageDialog').close()">×</button>
    <img id="imageLarge" alt="放大圖片">
  </dialog>

  <template id="cardTemplate">
    <article class="itemCard">
      <button class="heart" title="最愛">♡</button>
      <div class="thumb"><div class="bearMark"><i></i></div></div>
      <div class="cardBody">
        <div class="meta"></div>
        <h3></h3>
        <div class="tags moodLine"></div>
        <div class="note"></div>
        <div class="actions"><a class="openLink" target="_blank" rel="noopener">前往網址</a><button class="copyBtn">複製</button><button class="editBtn">編輯</button></div>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
