<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Bear 慢慢收藏♡</title>
  <meta name="theme-color" content="#2a1b14" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <header class="topbar">
      <div>
        <div class="brand-row"><span class="brand-script">Bear</span><span class="paw">◦</span></div>
        <div class="brand-sub">慢慢收藏♡</div>
      </div>
      <button id="settingsBtn" class="icon-btn" aria-label="設定">⚙︎</button>
    </header>

    <section class="search-card">
      <span class="search-ico">⌕</span>
      <input id="searchInput" type="search" placeholder="搜尋店名、分類、備註、網址…" />
    </section>

    <nav id="categoryTabs" class="tabs" aria-label="分類篩選"></nav>

    <main id="list" class="list"></main>

    <div id="emptyState" class="empty hidden">
      <div class="bear-stamp">ʕ•ᴥ•ʔ</div>
      <h2>還沒有收藏</h2>
      <p>貼一個網址，慢慢把喜歡的地方收進來。</p>
    </div>

    <button id="addBtn" class="fab" aria-label="新增收藏">＋</button>
  </div>

  <div id="sheetBackdrop" class="backdrop hidden"></div>
  <section id="editorSheet" class="sheet hidden" aria-hidden="true">
    <div class="grabber"></div>
    <div class="sheet-head">
      <h2 id="sheetTitle">新增收藏</h2>
      <button id="closeSheet" class="text-btn">關閉</button>
    </div>

    <form id="itemForm" class="form">
      <input type="hidden" id="editingId" />
      <label>名稱
        <input id="titleInput" required placeholder="例如 Little Cloud 小雲咖啡" />
      </label>
      <label>網址
        <input id="urlInput" type="url" placeholder="貼上 Google Maps / IG / 官網網址" />
      </label>
      <div class="two-col">
        <label>分類
          <input id="categoryInput" list="categoryList" placeholder="咖啡廳、餐廳、旅遊…" />
          <datalist id="categoryList"></datalist>
        </label>
        <label>地方
          <input id="placeInput" list="placeList" placeholder="台南、福岡、京都…" />
          <datalist id="placeList"></datalist>
        </label>
      </div>
      <label>備註
        <textarea id="noteInput" rows="4" placeholder="可以寫：要預約、適合下午茶、下次旅行想去…"></textarea>
      </label>

      <div class="mood-line">
        <label><input id="visitedInput" type="checkbox" /> 已去過</label>
        <label><input id="revisitInput" type="checkbox" /> 值得再訪</label>
        <label><input id="favoriteInput" type="checkbox" /> 🤎 最愛</label>
      </div>

      <div class="image-box">
        <div class="image-box-head">
          <span>圖片</span>
          <label class="upload-btn">選擇圖片<input id="imageInput" type="file" accept="image/*" multiple hidden /></label>
        </div>
        <div id="imagePreview" class="image-preview"></div>
        <p class="hint">圖片會先存在這個瀏覽器。正式接 Firebase 後，可再改成雲端同步。</p>
      </div>

      <div class="form-actions">
        <button type="button" id="deleteBtn" class="danger hidden">刪除</button>
        <button type="submit" class="primary">儲存</button>
      </div>
    </form>
  </section>

  <section id="settingsSheet" class="sheet hidden" aria-hidden="true">
    <div class="grabber"></div>
    <div class="sheet-head">
      <h2>設定</h2>
      <button id="closeSettings" class="text-btn">關閉</button>
    </div>
    <div class="settings-list">
      <button id="exportBtn" class="setting-row">匯出備份 <span>JSON</span></button>
      <label class="setting-row file-row">匯入備份 <span>選擇檔案</span><input id="importInput" type="file" accept="application/json" hidden /></label>
      <button id="clearDemoBtn" class="setting-row">清除全部資料 <span>慎用</span></button>
      <div class="setting-note">
        <strong>Firebase 同步</strong><br />
        這版先保證可用與不被 GitHub 更新覆蓋；下一版我再把妳的 Firebase 設定接進去，讓 Safari / Chrome 同步。
      </div>
    </div>
  </section>

  <div id="viewer" class="viewer hidden">
    <button id="closeViewer" class="viewer-close">×</button>
    <img id="viewerImg" alt="放大圖片" />
  </div>

  <script src="app.js"></script>
</body>
</html>
